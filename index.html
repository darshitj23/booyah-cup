<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cricket Arena | Ultimate Auction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a1a1f, #030c12);
            color: #f0f3f8;
            min-height: 100vh;
        }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030c12ee; backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-card {
            background: #0e202b; border-radius: 48px; padding: 40px 30px;
            width: 90%; max-width: 380px; text-align: center; border: 1px solid #f97316;
        }
        .login-card h2 { font-size: 2rem; margin-bottom: 20px; color: #f9a35c; }
        .login-card input {
            width: 100%; padding: 15px; margin: 12px 0; background: #03161f;
            border: 1px solid #f97316; border-radius: 60px; color: white;
            font-size: 1.2rem; text-align: center; outline: none;
        }
        .login-card button {
            background: linear-gradient(95deg, #f97316, #e05a1a);
            width: 100%; padding: 14px; font-weight: bold; border: none;
            border-radius: 60px; font-size: 1.2rem; color: white; margin-top: 12px; cursor: pointer;
        }
        .error-msg { color: #ff8866; margin-top: 12px; }
        .cric-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; background: rgba(0,20,30,0.85); backdrop-filter: blur(12px);
            border-bottom: 2px solid #e65c2e; position: sticky; top: 0; z-index: 99;
        }
        .menu-btn { font-size: 28px; cursor: pointer; color: #f97316; }
        .logo h1 { font-size: 1.6rem; background: linear-gradient(135deg,#fff1c1,#f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.7rem; color: #ffb347; }
        .sidebar {
            height: 100%; width: 0; position: fixed; top: 0; left: 0;
            background: #0b1a24f2; backdrop-filter: blur(16px); transition: 0.3s ease;
            padding-top: 70px; overflow-x: hidden; z-index: 1000; border-right: 2px solid #f97316;
        }
        .sidebar a {
            padding: 14px 24px; text-decoration: none; font-size: 1.1rem; font-weight: 600;
            color: #f0ede8; display: flex; align-items: center; gap: 14px; border-left: 3px solid transparent;
        }
        .sidebar a i { width: 28px; color: #f97316; }
        .sidebar a:hover { background: #f9731620; border-left-color: #f97316; transform: translateX(6px); }
        .close-sidebar { position: absolute; top: 15px; right: 22px; font-size: 28px; cursor: pointer; color: #f97316; }
        .container { padding: 20px 20px 40px; max-width: 1400px; margin: auto; }
        .section { display: none; animation: fade 0.3s ease; }
        .section.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        h2 {
            font-size: 2rem; border-left: 7px solid #f97316; padding-left: 18px;
            margin: 20px 0 30px; text-transform: uppercase; font-weight: 800;
        }
        .auction-main {
            display: flex; flex-direction: column; gap: 30px;
        }
        .teams-budget-row {
            display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .team-budget-card {
            background: #0f212e; border-radius: 32px; padding: 20px; text-align: center;
            flex: 1; min-width: 200px; border: 1px solid #f97316;
        }
        .team-budget-card h3 { color: #ffaa66; margin-bottom: 10px; }
        .team-budget { font-size: 2rem; font-weight: 800; color: #fbbf24; }
        .auction-player-wrapper {
            background: #0a1922; border-radius: 48px; padding: 25px; margin: 10px 0;
            border: 2px solid #f97316;
        }
        .auction-player-card {
            background: #0f212e; border-radius: 40px; padding: 22px;
        }
        .tier-badge { font-size: 1.3rem; font-weight: 800; display: inline-block; padding: 4px 20px; border-radius: 60px; margin-bottom: 15px; }
        .tier-high { background: #b91c1c; box-shadow: 0 0 12px red; }
        .tier-medium { background: #b45309; }
        .tier-low { background: #2b6e3c; }
        .player-name-large { font-size: 2rem; font-weight: 800; margin: 10px 0; }
        .rating-row { display: flex; justify-content: space-between; margin: 10px 0; background: #03161f; padding: 8px 16px; border-radius: 40px; }
        .price-area { background: #03161f; border-radius: 40px; padding: 15px; margin: 20px 0; text-align: center; }
        .bid-actions { display: flex; gap: 20px; margin: 20px 0; }
        .raise-btn, .giveup-btn { flex: 1; padding: 12px; font-weight: bold; border-radius: 44px; border: none; cursor: pointer; font-size: 1rem; }
        .raise-btn { background: #1e7e34; color: white; }
        .giveup-btn { background: #8b2c1d; color: white; }
        .turn-info { background: #00000060; padding: 10px; border-radius: 40px; text-align: center; margin: 15px 0 10px; }
        .next-btn { background: #f97316; border: none; padding: 12px; border-radius: 44px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }
        .players-ranking-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 25px; margin-top: 20px;
        }
        .player-rank-card {
            background: #0f212e; border-radius: 32px; padding: 22px;
            border: 1px solid #f9731650; transition: 0.2s;
        }
        .player-rank-card:hover { transform: translateY(-4px); border-color: #f97316; }
        .player-name-title { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 12px; color: #ffaa66; }
        .divider-line { height: 2px; background: linear-gradient(90deg, #f97316, transparent); margin: 12px 0 18px 0; }
        .skill-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-size: 1rem; }
        .skill-label { width: 80px; color: #cbd5e1; }
        .stars-container { display: flex; gap: 6px; cursor: pointer; }
        .star-icon { font-size: 1.6rem; color: #4b5563; transition: 0.1s; }
        .star-icon.filled { color: #fbbf24; text-shadow: 0 0 4px #f59e0b; }
        .readonly-star { font-size: 1.4rem; color: #fbbf24; letter-spacing: 4px; }
        .readonly-star.empty { color: #4b5563; }
        .avg-text { text-align: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #f9731650; font-weight: 600; color: #ffaa66; }
        .tier-full-table { background: #0f212e; border-radius: 32px; padding: 20px; margin-top: 35px; border: 1px solid #f9731660; }
        .tier-row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid #f9731630; }
        .tier-tag { font-weight: 800; width: 100px; }
        .tier-rank { width: 50px; color: #ffaa66; }
        .tier-player-name { flex: 1; text-align: left; padding-left: 15px; }
        .captain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 25px; margin-top: 20px; }
        .captain-card { background: #0f212e; border-radius: 32px; padding: 22px; border: 1px solid #f9731650; text-align: center; }
        .captain-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; color: #ffaa66; }
        .vote-btn { background: #f97316; border: none; padding: 10px 20px; border-radius: 40px; font-weight: bold; margin-top: 15px; cursor: pointer; width: 100%; }
        .unvote-btn { background: #8b2c1d; border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }
        .voted-text { background: #1e7e34; padding: 8px; border-radius: 30px; margin-top: 12px; }
        .admin-badge { font-size: 0.7rem; background: #f97316; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
        .match-auction-card, .dashboard-card {
            background: linear-gradient(145deg,#14242e,#0a1922); border-radius: 38px;
            padding: 25px 20px; margin-bottom: 35px; border: 1px solid #f9731650; text-align: center;
        }
        .start-auction-btn, .completed-tag {
            background: linear-gradient(95deg,#f97316,#e05a1a); border: none; padding: 12px 28px;
            font-weight: bold; border-radius: 60px; color: white; cursor: pointer; margin-top: 15px;
        }
        .completed-tag { background: #2c5a3e; cursor: default; opacity: 0.8; }
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 28px; margin-top: 25px; }
        .team-card { background: #0b202b; border-radius: 32px; padding: 20px; border-left: 8px solid #f97316; cursor: pointer; transition: 0.2s; }
        .team-card:hover { transform: translateY(-5px); background: #102f3e; }
        @media (max-width: 700px) {
            .players-ranking-grid, .captain-grid { grid-template-columns: 1fr; }
            .skill-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .teams-budget-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 CRICKET ARENA</h2>
        <input type="password" id="loginPass" placeholder="Enter Password" autocomplete="off">
        <button onclick="attemptLogin()">🎤 ENTER</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="cric-header">
    <div class="menu-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></div>
    <div class="logo"><h1>🏏 CRICKET ARENA</h1><p>Auction • Rankings • Captain's Pick</p></div>
    <div style="width: 28px;"></div>
</div>

<div id="sidebar" class="sidebar">
    <span class="close-sidebar" onclick="closeSidebar()"><i class="fas fa-times"></i></span>
    <a href="#" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="#" id="auctionMenuLink" style="display: none;" onclick="showSection('auction')"><i class="fas fa-gavel"></i> Auction</a>
    <a href="#" onclick="showSection('rankingsystem')"><i class="fas fa-star"></i> Ranking System</a>
    <a href="#" onclick="showSection('captainsarea')"><i class="fas fa-crown"></i> Captain's Area</a>
    <a href="#" onclick="showSection('teamsinfo')"><i class="fas fa-users"></i> Teams Info</a>
    <a href="#" onclick="showSection('playersinfo')"><i class="fas fa-id-card"></i> Player's Info</a>
</div>

<div class="container">
    <div id="dashboard" class="section active"><div style="text-align:center; padding:80px 20px; background:#07161f; border-radius:48px;">
        <i class="fas fa-trophy" style="font-size: 55px; color:#f97316;"></i><h2 style="margin-top:15px;">Cricket Arena 2026</h2><p>Hosted by Darshit | 11 Elite Players</p>
    </div></div>
    <div id="auction" class="section"><div id="auctionMatchesContainer"></div></div>

    <div id="rankingsystem" class="section">
        <h2>📊 RANKING SYSTEM</h2>
        <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 25px;">
            <button class="start-auction-btn" style="background:#2c5a3e;" onclick="showVotingGrid()">⭐ My Ranking (Vote)</button>
            <button class="start-auction-btn" style="background:#2c5a3e;" onclick="showOverallRankingGrid()">🏆 Overall Ranking</button>
        </div>
        <div id="rankingGridContainer"></div>
        <div id="tierTableContainer" class="tier-full-table" style="margin-top: 35px;"></div>
    </div>

    <div id="captainsarea" class="section">
        <h2>👑 CAPTAIN'S AREA</h2>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
            <button class="start-auction-btn" onclick="loadCaptainArea('match1')">🏏 Match-1 Voting</button>
            <button class="start-auction-btn" onclick="loadCaptainArea('match2')">🏏 Match-2 Voting</button>
        </div>
        <div id="captainAreaContainer"></div>
    </div>

    <div id="teamsinfo" class="section"><h2>🏟️ TEAMS INFO</h2><div id="teamsInfoGrid"></div></div>
    <div id="playersinfo" class="section"><h2>👥 PLAYER'S INFO</h2><div id="playersList"></div></div>
</div>

<script>
    // ---------- DATA & STORAGE ----------
    const passwordMap = { "0088":"DARSHIT","1166":"MANYA","4BN8":"KRISHIL","9L60":"DEV","32AH":"AKSHIT","710K":"NISHIT","3NR8":"SAUMIL","12BL":"VEDANT","32CZ":"BHARGAV","2233":"PRADIP","3A09":"KUNJ" };
    let currentUser = null, currentUserRole = null;
    let rankingVotes = JSON.parse(localStorage.getItem("cricket_rank_votes")) || {};
    let captainVotes = JSON.parse(localStorage.getItem("cricket_captain_votes")) || { match1: {}, match2: {} };
    let purchasedTeams = JSON.parse(localStorage.getItem("cricket_teams_purchased")) || { match1: { teamA: [], teamB: [], budgetA: 9, budgetB: 9 }, match2: { teamA: [], teamB: [], budgetA: 9, budgetB: 9 } };
    
    // ⚡ IMPORTANT: Auction state is NEVER saved to localStorage (no resume issue)
    let auctionState = { match1: null, match2: null };
    
    const PLAYERS_LIST = ["DARSHIT","KRISHIL","DEV","AKSHIT","NISHIT","SAUMIL","VEDANT","BHARGAV","KUNJ","MANYA","PRADIP"];

    function attemptLogin() {
        let pass = document.getElementById("loginPass").value.trim();
        if(!passwordMap[pass]) { document.getElementById("loginError").innerText = "❌ Incorrect password."; return; }
        currentUser = passwordMap[pass];
        currentUserRole = currentUser === "DARSHIT" ? "admin" : "player";
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("auctionMenuLink").style.display = currentUser === "DARSHIT" ? "flex" : "none";
        refreshUI();
    }

    function refreshUI() {
        if(document.getElementById("rankingsystem").classList.contains("active")) showVotingGrid();
        if(document.getElementById("captainsarea").classList.contains("active")) loadCaptainArea('match1');
        renderPlayersInfo(); renderTeamsInfo();
    }

    // ---------- RANKING ENGINE ----------
    function computeRankingData() {
        let stats = {};
        PLAYERS_LIST.forEach(n => { stats[n] = { batting:{t:0,c:0}, bowling:{t:0,c:0}, keeping:{t:0,c:0}, fielding:{t:0,c:0} }; });
        for(let voter in rankingVotes) {
            for(let target in rankingVotes[voter]) {
                let c = rankingVotes[voter][target];
                if(c.batting){ stats[target].batting.t += c.batting; stats[target].batting.c++; }
                if(c.bowling){ stats[target].bowling.t += c.bowling; stats[target].bowling.c++; }
                if(c.keeping){ stats[target].keeping.t += c.keeping; stats[target].keeping.c++; }
                if(c.fielding){ stats[target].fielding.t += c.fielding; stats[target].fielding.c++; }
            }
        }
        let final = [];
        for(let name of PLAYERS_LIST) {
            let bat = stats[name].batting.c ? (stats[name].batting.t / stats[name].batting.c).toFixed(2) : 0;
            let bowl = stats[name].bowling.c ? (stats[name].bowling.t / stats[name].bowling.c).toFixed(2) : 0;
            let keep = stats[name].keeping.c ? (stats[name].keeping.t / stats[name].keeping.c).toFixed(2) : 0;
            let field = stats[name].fielding.c ? (stats[name].fielding.t / stats[name].fielding.c).toFixed(2) : 0;
            let overall = (parseFloat(bat)+parseFloat(bowl)+parseFloat(keep)+parseFloat(field))/4;
            final.push({ name, batting: parseFloat(bat), bowling: parseFloat(bowl), keeping: parseFloat(keep), fielding: parseFloat(field), overall: parseFloat(overall.toFixed(2)) });
        }
        final.sort((a,b)=>b.overall - a.overall);
        final.forEach((p,idx)=>{ p.rank=idx+1; p.tier = idx<4?"HIGH":(idx<8?"MEDIUM":"LOW"); });
        return final;
    }

    function renderStarRating(value, max=5, interactive=false, skillName="", targetPlayer="") {
        let full = Math.round(value);
        if(!interactive){
            let stars = "";
            for(let i=1;i<=max;i++) stars += `<span class="readonly-star ${i<=full ? '' : 'empty'}">★</span>`;
            return stars;
        } else {
            let starsHtml = "";
            for(let i=1;i<=max;i++){
                starsHtml += `<span class="star-icon ${i<=full ? 'filled' : ''}" onclick="setStarRating('${targetPlayer}','${skillName}',${i})">★</span>`;
            }
            return starsHtml;
        }
    }

    window.setStarRating = function(targetPlayer, skill, starValue) {
        if(!currentUser) return;
        if(!rankingVotes[currentUser]) rankingVotes[currentUser] = {};
        if(!rankingVotes[currentUser][targetPlayer]) rankingVotes[currentUser][targetPlayer] = { batting:0, bowling:0, keeping:0, fielding:0 };
        rankingVotes[currentUser][targetPlayer][skill] = starValue;
        localStorage.setItem("cricket_rank_votes", JSON.stringify(rankingVotes));
        showVotingGrid();
    };

    function showVotingGrid() {
        if(!currentUser){ document.getElementById("rankingGridContainer").innerHTML = "<div style='padding:40px;text-align:center;'>Please login to vote</div>"; return; }
        let rankData = computeRankingData();
        let otherPlayers = rankData.filter(p => p.name !== currentUser);
        let html = `<div class="players-ranking-grid">`;
        otherPlayers.forEach(player => {
            let existing = rankingVotes[currentUser]?.[player.name] || { batting:0, bowling:0, keeping:0, fielding:0 };
            html += `<div class="player-rank-card"><div class="player-name-title">${player.name}</div><div class="divider-line"></div>
                <div class="skill-row"><span class="skill-label">🏏 Batting</span><div class="stars-container">${renderStarRating(existing.batting,5,true,"batting",player.name)}</div></div>
                <div class="skill-row"><span class="skill-label">🎯 Bowling</span><div class="stars-container">${renderStarRating(existing.bowling,5,true,"bowling",player.name)}</div></div>
                <div class="skill-row"><span class="skill-label">🏃 Fielding</span><div class="stars-container">${renderStarRating(existing.fielding,5,true,"fielding",player.name)}</div></div>
                <div class="skill-row"><span class="skill-label">🧤 Keeping</span><div class="stars-container">${renderStarRating(existing.keeping,5,true,"keeping",player.name)}</div></div>
            </div>`;
        });
        html += `</div><div class="turn-text" style="margin-top:20px;">⭐ Click on stars to rate (max 5). Position does NOT change after voting.</div>`;
        document.getElementById("rankingGridContainer").innerHTML = html;
        renderTierTable();
    }

    function showOverallRankingGrid() {
        let rankData = computeRankingData();
        let html = `<div class="players-ranking-grid">`;
        rankData.forEach(player => {
            html += `<div class="player-rank-card"><div class="player-name-title">${player.name} <span style="font-size:0.8rem;">(#${player.rank})</span></div><div class="divider-line"></div>
                <div class="skill-row"><span class="skill-label">🏏 Batting</span><div>${renderStarRating(player.batting,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🎯 Bowling</span><div>${renderStarRating(player.bowling,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🏃 Fielding</span><div>${renderStarRating(player.fielding,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🧤 Keeping</span><div>${renderStarRating(player.keeping,5,false)}</div></div>
                <div class="avg-text">⭐ Overall: ${player.overall.toFixed(1)} / 5 • Tier: ${player.tier}</div>
            </div>`;
        });
        html += `</div>`;
        document.getElementById("rankingGridContainer").innerHTML = html;
        renderTierTable();
    }

    function renderTierTable() {
        let rankData = computeRankingData();
        let highTier = rankData.filter(p => p.tier === "HIGH");
        let mediumTier = rankData.filter(p => p.tier === "MEDIUM");
        let lowTier = rankData.filter(p => p.tier === "LOW");
        let html = `<h3 style="margin-bottom: 15px;">🏷️ TIER BREAKDOWN (based on overall ranking)</h3>
            <div style="margin-bottom: 12px;"><span style="color:#f97316;">⬤ HIGH (Top 4)</span></div>`;
        highTier.forEach(p => { html += `<div class="tier-row-item"><div class="tier-tag">HIGH</div><div class="tier-rank">#${p.rank}</div><div class="tier-player-name">${p.name}</div></div>`; });
        html += `<div style="margin: 20px 0 12px;"><span style="color:#ffb347;">⬤ MEDIUM (Next 4)</span></div>`;
        mediumTier.forEach(p => { html += `<div class="tier-row-item"><div class="tier-tag">MEDIUM</div><div class="tier-rank">#${p.rank}</div><div class="tier-player-name">${p.name}</div></div>`; });
        html += `<div style="margin: 20px 0 12px;"><span style="color:#2ecc71;">⬤ LOW (Last 3)</span></div>`;
        lowTier.forEach(p => { html += `<div class="tier-row-item"><div class="tier-tag">LOW</div><div class="tier-rank">#${p.rank}</div><div class="tier-player-name">${p.name}</div></div>`; });
        document.getElementById("tierTableContainer").innerHTML = html;
    }

    // ---------- CAPTAIN AREA ----------
    function loadCaptainArea(matchKey) {
        if(!currentUser){ document.getElementById("captainAreaContainer").innerHTML = "<div style='padding:40px;text-align:center;'>Login required</div>"; return; }
        let candidates = PLAYERS_LIST.filter(p => p !== currentUser);
        let currentVote = captainVotes[matchKey]?.[currentUser] || null;
        let isAdmin = (currentUserRole === "admin");
        let html = `<div class="captain-grid">`;
        candidates.forEach(cap => {
            let voteCount = Object.values(captainVotes[matchKey] || {}).filter(v => v === cap).length;
            let isVoted = (currentVote === cap);
            html += `<div class="captain-card"><div class="captain-name">${cap} ${isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</div><div class="divider-line"></div><div>📊 Votes: ${voteCount}</div>`;
            if(isVoted) {
                html += `<div class="voted-text">✅ VOTED (${cap})</div>`;
                if(isAdmin) html += `<button class="unvote-btn" onclick="unvoteCaptain('${matchKey}','${cap}')">🗑️ CHANGE / REMOVE VOTE</button>`;
            } else {
                html += `<button class="vote-btn" onclick="castCaptainVote('${matchKey}','${cap}')">🗳️ VOTE</button>`;
            }
            html += `</div>`;
        });
        html += `</div>`;
        document.getElementById("captainAreaContainer").innerHTML = html;
    }

    window.castCaptainVote = function(matchKey, captainName) {
        if(!currentUser) return;
        let isAdmin = (currentUserRole === "admin");
        if(!isAdmin && captainVotes[matchKey] && captainVotes[matchKey][currentUser]) { alert("You have already voted! Locked."); loadCaptainArea(matchKey); return; }
        if(!captainVotes[matchKey]) captainVotes[matchKey] = {};
        captainVotes[matchKey][currentUser] = captainName;
        localStorage.setItem("cricket_captain_votes", JSON.stringify(captainVotes));
        loadCaptainArea(matchKey);
    };
    window.unvoteCaptain = function(matchKey, currentCaptain) {
        if(currentUserRole !== "admin") { alert("Only admin"); return; }
        if(captainVotes[matchKey] && captainVotes[matchKey][currentUser] === currentCaptain) {
            delete captainVotes[matchKey][currentUser];
            localStorage.setItem("cricket_captain_votes", JSON.stringify(captainVotes));
            loadCaptainArea(matchKey);
        }
    };

    // ---------- AUCTION (NO LOCALSTORAGE - FRESH EVERY TIME) ----------
    function renderAuctionMenu() {
        let matches = [
            { id:"match1", name:"MATCH - 1", teamA:"THUNDER", teamB:"WARRIORS", status: auctionState.match1?.completed ? "completed" : (auctionState.match1?.started ? "ongoing" : "pending") },
            { id:"match2", name:"MATCH - 2", teamA:"TIGERS", teamB:"LIONS", status: auctionState.match2?.completed ? "completed" : (auctionState.match2?.started ? "ongoing" : "pending") }
        ];
        let container = document.getElementById("auctionMatchesContainer");
        container.innerHTML = matches.map(m => `<div class="match-auction-card"><h3>🏏 ${m.name}</h3><div>⚡ ${m.teamA}  vs  ${m.teamB}</div>
            ${m.status === "completed" ? `<div class="completed-tag">✅ COMPLETED</div>` : (m.status === "ongoing" ? `<button class="start-auction-btn" onclick="resumeAuction('${m.id}')">▶️ RESUME AUCTION</button>` : `<button class="start-auction-btn" onclick="startAuction('${m.id}', '${m.teamA}', '${m.teamB}')">🚀 START AUCTION</button>`)}</div>`).join("");
    }

    function getPlayerOrderByTier(rankData) {
        let high = rankData.filter(p=>p.tier==="HIGH").sort((a,b)=>a.rank-b.rank);
        let med = rankData.filter(p=>p.tier==="MEDIUM").sort((a,b)=>a.rank-b.rank);
        let low = rankData.filter(p=>p.tier==="LOW").sort((a,b)=>a.rank-b.rank);
        let order = [];
        if(high[0]) order.push(high[0]); if(med[0]) order.push(med[0]); if(high[1]) order.push(high[1]);
        if(high[2]) order.push(high[2]); if(low[0]) order.push(low[0]); if(med[1]) order.push(med[1]);
        if(low[1]) order.push(low[1]); if(med[2]) order.push(med[2]); if(low[2]) order.push(low[2]);
        if(high[3]) order.push(high[3]); if(med[3]) order.push(med[3]);
        return order.filter(x=>x);
    }

    function startAuction(matchId, teamA, teamB) {
        let rankData = computeRankingData();
        let queue = getPlayerOrderByTier(rankData);
        if(!queue.length) return;
        purchasedTeams[matchId] = { teamA: [], teamB: [], budgetA: 9, budgetB: 9 };
        localStorage.setItem("cricket_teams_purchased", JSON.stringify(purchasedTeams));
        auctionState[matchId] = {
            started: true, completed: false, teamA, teamB, currentIndex: 0,
            playersQueue: queue.map(p=>p.name),
            currentBid: null, currentTurn: "A", lastBidTeam: null, lastBidAmount: null
        };
        showAuctionScreen(matchId);
    }

    function resumeAuction(matchId) { 
        let state = auctionState[matchId];
        if(!state || state.completed) {
            alert("Auction not in progress. Please start a new auction.");
            renderAuctionMenu();
            showSection('auction');
            return;
        }
        showAuctionScreen(matchId); 
    }

    function showAuctionScreen(matchId) {
        let state = auctionState[matchId];
        if(!state || state.completed) { alert("Auction over."); renderAuctionMenu(); showSection('auction'); return; }
        let playerName = state.playersQueue[state.currentIndex];
        let rankInfo = computeRankingData().find(p => p.name === playerName);
        let tier = rankInfo.tier;
        let basePrice = tier === "HIGH" ? 2 : (tier === "MEDIUM" ? 1 : 0.5);
        let currentBidVal = state.currentBid !== null ? state.currentBid : basePrice;
        let teamData = purchasedTeams[matchId];
        let html = `
            <div class="auction-main">
                <div class="teams-budget-row">
                    <div class="team-budget-card"><h3>⚡ ${state.teamA}</h3><div class="team-budget">${teamData.budgetA.toFixed(2)} CP</div></div>
                    <div class="team-budget-card"><h3>⚡ ${state.teamB}</h3><div class="team-budget">${teamData.budgetB.toFixed(2)} CP</div></div>
                </div>
                <div class="auction-player-wrapper">
                    <div class="auction-player-card">
                        <div class="tier-badge tier-${tier.toLowerCase()}">${tier} TIER</div>
                        <div class="player-name-large">🏏 ${playerName}</div>
                        <div class="rating-row"><span class="rating-label">🏏 Batting</span> <span>${renderStarRating(rankInfo.batting,5,false)}</span></div>
                        <div class="rating-row"><span class="rating-label">🎯 Bowling</span> <span>${renderStarRating(rankInfo.bowling,5,false)}</span></div>
                        <div class="rating-row"><span class="rating-label">🏃 Fielding</span> <span>${renderStarRating(rankInfo.fielding,5,false)}</span></div>
                        <div class="rating-row"><span class="rating-label">🧤 Keeping</span> <span>${renderStarRating(rankInfo.keeping,5,false)}</span></div>
                        <div class="price-area">
                            <div>💰 Base Price: ${basePrice.toFixed(2)} Cr</div>
                            <div>💵 Current Bid: ${currentBidVal.toFixed(2)} Cr</div>
                        </div>
                        <div class="bid-actions">
                            <button class="raise-btn" onclick="raiseBid('${matchId}')">⚡ RAISE BID</button>
                            <button class="giveup-btn" onclick="giveUpAuction('${matchId}')">❌ GIVE UP</button>
                        </div>
                        <div class="turn-info">🎤 Now Turn of: ${state.currentTurn === "A" ? state.teamA : state.teamB}</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("auctionMatchesContainer").innerHTML = html;
        showSection('auction');
        window.currentAuctionMatch = matchId;
    }

    window.raiseBid = function(matchId) {
        let state = auctionState[matchId];
        if(!state) return;
        let playerName = state.playersQueue[state.currentIndex];
        let tier = computeRankingData().find(p=>p.name===playerName).tier;
        let base = tier === "HIGH" ? 2 : (tier === "MEDIUM" ? 1 : 0.5);
        let curr = state.currentBid !== null ? state.currentBid : base;
        let increment = curr < 1 ? 0.05 : (curr < 2 ? 0.1 : 0.2);
        let newBid = curr + increment;
        state.currentBid = newBid;
        state.lastBidTeam = state.currentTurn;
        state.lastBidAmount = newBid;
        state.currentTurn = state.currentTurn === "A" ? "B" : "A";
        showAuctionScreen(matchId);
    };

    window.giveUpAuction = function(matchId) {
        let state = auctionState[matchId];
        if(!state) return;
        let playerName = state.playersQueue[state.currentIndex];
        let winnerTeam = state.lastBidTeam;
        let price = state.lastBidAmount !== null ? state.lastBidAmount : (() => {
            let t = computeRankingData().find(p=>p.name===playerName).tier;
            return t === "HIGH" ? 2 : (t === "MEDIUM" ? 1 : 0.5);
        })();
        let teamData = purchasedTeams[matchId];
        if(winnerTeam) {
            let winnerName = winnerTeam === "A" ? state.teamA : state.teamB;
            let winnerBudget = winnerTeam === "A" ? teamData.budgetA : teamData.budgetB;
            if(winnerBudget >= price) {
                alert(`🎉 WOW!! ${winnerName} purchased ${playerName} for ${price.toFixed(2)} Cr`);
                if(winnerTeam === "A") {
                    teamData.teamA.push({ player: playerName, price });
                    teamData.budgetA -= price;
                } else {
                    teamData.teamB.push({ player: playerName, price });
                    teamData.budgetB -= price;
                }
                localStorage.setItem("cricket_teams_purchased", JSON.stringify(purchasedTeams));
            } else {
                alert(`❌ ${winnerName} has insufficient budget (${winnerBudget.toFixed(2)} Cr). Player unsold.`);
            }
        } else {
            alert(`😞 ${playerName} unsold! No bids placed.`);
        }
        state.currentIndex++;
        state.currentBid = null;
        state.lastBidTeam = null;
        state.lastBidAmount = null;
        state.currentTurn = "A";
        if(state.currentIndex >= state.playersQueue.length) {
            state.completed = true;
            renderAuctionMenu();
            showSection('auction');
            alert("✅ Auction completed!");
            return;
        }
        let nextBtnHtml = `<div style="margin-top: 20px;"><button class="next-btn" onclick="loadNextPlayer('${matchId}')">➡️ NEXT PLAYER</button></div>`;
        let container = document.getElementById("auctionMatchesContainer");
        container.insertAdjacentHTML("beforeend", nextBtnHtml);
    };

    window.loadNextPlayer = function(matchId) {
        showAuctionScreen(matchId);
    };

    function renderTeamsInfo() {
        let matches = ["match1","match2"];
        let teamsMap = { match1: { A: "THUNDER", B: "WARRIORS" }, match2: { A: "TIGERS", B: "LIONS" } };
        let html = `<div class="teams-grid">`;
        for(let m of matches){
            let data = purchasedTeams[m];
            if(data) {
                html += `<div class="team-card" onclick="showTeamDetails('${m}','A')"><h3>🏆 ${teamsMap[m].A} (${data.budgetA.toFixed(2)} CP left)</h3><ul>${data.teamA.slice(0,2).map(t=>`<li>${t.player} - ${t.price.toFixed(2)} Cr</li>`).join('')}${data.teamA.length>2?`<li>+${data.teamA.length-2} more</li>`:''}</ul></div>`;
                html += `<div class="team-card" onclick="showTeamDetails('${m}','B')"><h3>⚔️ ${teamsMap[m].B} (${data.budgetB.toFixed(2)} CP left)</h3><ul>${data.teamB.slice(0,2).map(t=>`<li>${t.player} - ${t.price.toFixed(2)} Cr</li>`).join('')}${data.teamB.length>2?`<li>+${data.teamB.length-2} more</li>`:''}</ul></div>`;
            } else {
                html += `<div class="team-card"><h3>🏆 ${teamsMap[m].A}</h3><div>No players yet</div></div>`;
                html += `<div class="team-card"><h3>⚔️ ${teamsMap[m].B}</h3><div>No players yet</div></div>`;
            }
        }
        html += `</div>`;
        document.getElementById("teamsInfoGrid").innerHTML = html;
    }

    window.showTeamDetails = function(matchId, side) {
        let teamsMap = { match1: { A: "THUNDER", B: "WARRIORS" }, match2: { A: "TIGERS", B: "LIONS" } };
        let players = purchasedTeams[matchId]?.[side === "A" ? "teamA" : "teamB"] || [];
        let rankData = computeRankingData();
        let detailHtml = `<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc; backdrop-filter:blur(8px); z-index:1100; display:flex; align-items:center; justify-content:center;" onclick="this.remove()">
            <div style="background:#0f212e; max-width:500px; width:90%; border-radius:48px; padding:25px; border:2px solid #f97316;" onclick="event.stopPropagation()">
            <h3 style="color:#f97316">🏏 ${teamsMap[matchId][side]} (${matchId})</h3>`;
        players.forEach(p => {
            let stats = rankData.find(r=>r.name === p.player);
            detailHtml += `<div style="margin:15px 0; padding:12px; background:#0a1922; border-radius:32px;">
                <strong>${p.player}</strong> (${stats?.tier||"MEDIUM"}) <br>
                🏏 ${renderStarRating(stats?.batting||0,5,false)} &nbsp; 🎯 ${renderStarRating(stats?.bowling||0,5,false)} <br>
                🧤 ${renderStarRating(stats?.keeping||0,5,false)} &nbsp; 🏃 ${renderStarRating(stats?.fielding||0,5,false)}
                <div>💰 ${p.price.toFixed(2)} Cr</div>
            </div>`;
        });
        detailHtml += `<button class="start-auction-btn" onclick="this.closest('div').parentElement.remove()">Close</button></div></div>`;
        document.body.insertAdjacentHTML("beforeend", detailHtml);
    };

    function renderPlayersInfo() {
        let rankData = computeRankingData();
        let html = `<div class="players-ranking-grid">`;
        PLAYERS_LIST.forEach(name => {
            let stats = rankData.find(r=>r.name===name);
            html += `<div class="player-rank-card"><div class="player-name-title">${name}</div><div class="divider-line"></div>
                <div class="skill-row"><span class="skill-label">🏏 Batting</span><div>${renderStarRating(stats?.batting||0,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🎯 Bowling</span><div>${renderStarRating(stats?.bowling||0,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🏃 Fielding</span><div>${renderStarRating(stats?.fielding||0,5,false)}</div></div>
                <div class="skill-row"><span class="skill-label">🧤 Keeping</span><div>${renderStarRating(stats?.keeping||0,5,false)}</div></div>
                <div class="avg-text">⭐ Overall: ${stats?.overall?.toFixed(1)||0} / 5 • Tier: ${stats?.tier||"MEDIUM"}</div>
            </div>`;
        });
        html += `</div>`;
        document.getElementById("playersList").innerHTML = html;
    }

    function openSidebar() { document.getElementById("sidebar").style.width = "280px"; }
    function closeSidebar() { document.getElementById("sidebar").style.width = "0"; }
    function showSection(id) {
        document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
        document.getElementById(id).classList.add("active"); closeSidebar();
        if(id === 'auction') renderAuctionMenu();
        if(id === 'teamsinfo') renderTeamsInfo();
        if(id === 'playersinfo') renderPlayersInfo();
        if(id === 'rankingsystem') showVotingGrid();
        if(id === 'captainsarea') loadCaptainArea('match1');
    }
    window.showSection = showSection; window.showVotingGrid = showVotingGrid; window.showOverallRankingGrid = showOverallRankingGrid; window.loadCaptainArea = loadCaptainArea;
    renderTeamsInfo(); renderPlayersInfo();
</script>
</body>
</html>
